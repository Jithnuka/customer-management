spring.application.name=customer-management

# Server
server.port=8080

# Database Configuration (MariaDB)
spring.datasource.url=jdbc:mariadb://localhost:3306/customer_management?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# In production, use a secure, randomly generated 256-bit (32 byte) base64 encoded string
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# File Upload Max Size for Excel
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
